name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.20', '1.24', '1.25', '1.26']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Check generated files
      run: |
        go generate ./...
        if ! git diff --exit-code; then
          echo "Generated files have changed. Please run 'go generate ./...' and commit the changes."
          exit 1
        fi

    - name: Run tests
      run: go test -v ./...
    
    - name: Run tests (jsonV2)
      if: matrix.go-version == '1.25' || matrix.go-version == '1.26'
      env:
        GOEXPERIMENT: jsonv2
      run: go test -v ./...

    - name: Run linters
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2

    - name: Run linters (jsonV2)
      if: matrix.go-version == '1.25' || matrix.go-version == '1.26'
      env:
        GOEXPERIMENT: jsonv2
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
